<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Urna Eletrônica - Votação</title>

<style>

body{
font-family:Arial;
background:#eef2f7;
text-align:center;
margin:0;
}

header{
background:#003366;
color:white;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.urna{
background:#ddd;
padding:30px;
border-radius:10px;
margin-top:20px;
}

.display{
background:black;
color:#00ff00;
font-size:40px;
padding:10px;
width:150px;
margin:auto;
}

.teclado{
margin-top:20px;
display:grid;
grid-template-columns:repeat(3,80px);
gap:10px;
justify-content:center;
}

.teclado button{
padding:20px;
font-size:20px;
cursor:pointer;
}

.candidato{
margin-top:20px;
font-size:20px;
}

.foto{
width:120px;
margin-top:10px;
border-radius:5px;
}

input{
padding:10px;
margin:5px;
}

button{
border:none;
border-radius:5px;
}

#grafico{
margin-top:40px;
display:flex;
justify-content:center;
align-items:flex-end;
gap:30px;
height:200px;
}

.barra{
width:80px;
background:#3498db;
height:0;
color:white;
display:flex;
align-items:flex-end;
justify-content:center;
}

</style>
</head>

<body>

<header>
<h1>🗳️ Sistema de Votação</h1>
</header>

<div class="container">

<h2>Login do Eleitor</h2>

<input type="text" id="cpf" placeholder="CPF">
<input type="password" id="senha" placeholder="Senha">
<button onclick="login()">Entrar</button>

<div id="urnaArea" style="display:none">

<div class="urna">

<div class="display" id="numero"></div>

<div class="teclado">

<button onclick="digitar(1)">1</button>
<button onclick="digitar(2)">2</button>
<button onclick="digitar(3)">3</button>

<button onclick="digitar(4)">4</button>
<button onclick="digitar(5)">5</button>
<button onclick="digitar(6)">6</button>

<button onclick="digitar(7)">7</button>
<button onclick="digitar(8)">8</button>
<button onclick="digitar(9)">9</button>

<button onclick="corrigir()">←</button>
<button onclick="digitar(0)">0</button>
<button onclick="confirmar()">✔</button>

</div>

<div class="candidato" id="nomeCandidato"></div>
<img id="fotoCandidato" class="foto">

</div>

</div>

<h2>Resultado</h2>

<div id="grafico">
<div class="barra" id="b12">0</div>
<div class="barra" id="b13">0</div>
<div class="barra" id="b14">0</div>
<div class="barra" id="b15">0</div>
</div>

<button onclick="gerarPDF()">Gerar PDF</button>

</div>

<script>

let numero=""

let eleitores=[
{cpf:"111",senha:"123"},
{cpf:"222",senha:"123"},
{cpf:"333",senha:"123"},
{cpf:"444",senha:"123"},
{cpf:"555",senha:"123"}

]

let candidatos={
12:{nome:"Kayo",foto:"https://i.pravatar.cc/120?img=1"},
13:{nome:"Pedro",foto:"https://i.pravatar.cc/120?img=2"},
14:{nome:"Alyson",foto:"https://i.pravatar.cc/120?img=3"},
15:{nome:"Carlos",foto:"https://i.pravatar.cc/120?img=4"}
}

let votos=JSON.parse(localStorage.getItem("votos"))||{
12:0,13:0,14:0,15:0
}

function login(){

let cpf=document.getElementById("cpf").value
let senha=document.getElementById("senha").value

let ok=eleitores.find(e=>e.cpf==cpf && e.senha==senha)

if(!ok){
alert("Eleitor inválido")
return
}

if(localStorage.getItem("votou_"+cpf)){
alert("Você já votou")
return
}

localStorage.setItem("eleitorAtual",cpf)

document.getElementById("urnaArea").style.display="block"

}

function digitar(n){

if(numero.length>=2) return

numero+=n

document.getElementById("numero").innerText=numero

if(candidatos[numero]){

document.getElementById("nomeCandidato").innerText=candidatos[numero].nome

document.getElementById("fotoCandidato").src=candidatos[numero].foto

}

}

function corrigir(){

numero=""

document.getElementById("numero").innerText=""

document.getElementById("nomeCandidato").innerText=""

document.getElementById("fotoCandidato").src=""

}

function confirmar(){

if(!candidatos[numero]){
alert("Candidato inválido")
return
}

votos[numero]++

localStorage.setItem("votos",JSON.stringify(votos))

let cpf=localStorage.getItem("eleitorAtual")
localStorage.setItem("votou_"+cpf,true)

alert("Voto confirmado!")

corrigir()

atualizarGrafico()

}

function atualizarGrafico(){

for(let c in votos){

let barra=document.getElementById("b"+c)

barra.style.height=votos[c]*30+"px"

barra.innerText=votos[c]

}

}

function gerarPDF(){

let texto="Resultado da votação\n\n"

for(let c in votos){
texto+=c+" - "+candidatos[c].nome+" : "+votos[c]+" votos\n"
}

let janela=window.open()

janela.document.write("<pre>"+texto+"</pre>")

janela.print()

}

atualizarGrafico()

</script>

</body>
</html>
