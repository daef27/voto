<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Urna Eletrônica</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial;
background:#eef2f7;
text-align:center;
margin:0;
}

header{
background:#003366;
color:white;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.urna{
background:#dcdcdc;
padding:20px;
border-radius:10px;
margin-top:20px;
display:inline-block;
}

.display{
background:black;
color:#00ff00;
font-size:35px;
padding:10px;
width:150px;
margin:auto;
margin-bottom:10px;
}

.teclado{
margin-top:20px;
display:grid;
grid-template-columns:repeat(3,80px);
gap:10px;
justify-content:center;
}

.teclado button{
padding:20px;
font-size:18px;
cursor:pointer;
background:white;
border-radius:5px;
border:none;
}

.foto{
width:120px;
margin-top:10px;
}

@media(max-width:600px){

.teclado{
grid-template-columns:repeat(3,60px);
}

.display{
font-size:28px;
}

}

</style>
</head>

<body>

<header>
<h1>🗳️ Sistema de Votação</h1>
</header>

<div class="container">

<h2>Login do Eleitor</h2>

<input type="text" id="cpf" placeholder="CPF">
<input type="password" id="senha" placeholder="Senha">

<br><br>

<button onclick="login()">Entrar</button>

<div id="urnaArea" style="display:none">

<div class="urna">

<div class="display" id="numero"></div>

<div class="teclado">

<button onclick="digitar(1)">1</button>
<button onclick="digitar(2)">2</button>
<button onclick="digitar(3)">3</button>

<button onclick="digitar(4)">4</button>
<button onclick="digitar(5)">5</button>
<button onclick="digitar(6)">6</button>

<button onclick="digitar(7)">7</button>
<button onclick="digitar(8)">8</button>
<button onclick="digitar(9)">9</button>

<button onclick="corrigir()">←</button>
<button onclick="digitar(0)">0</button>
<button onclick="confirmar()">✔</button>

<button onclick="votarBranco()">Branco</button>

</div>

<div id="nomeCandidato"></div>
<img id="fotoCandidato" class="foto">

</div>

</div>

<br><br>

<button onclick="gerarPDF()">📄 Gerar Resultado PDF</button>

</div>

<script>

let numero=""

let eleitores=[
{cpf:"466",senha:"123"},
{cpf:"125",senha:"123"}
]

let candidatos={
12:{nome:"Kayo",foto:"https://i.pravatar.cc/150?img=1"},
13:{nome:"Pedro",foto:"https://i.pravatar.cc/150?img=2"},
14:{nome:"Alyson",foto:"https://i.pravatar.cc/150?img=3"},
15:{nome:"Carlos",foto:"https://i.pravatar.cc/150?img=4"}
}

let votos=JSON.parse(localStorage.getItem("votos"))||{
12:0,
13:0,
14:0,
15:0,
branco:0
}

function login(){

let cpf=document.getElementById("cpf").value
let senha=document.getElementById("senha").value

let ok=eleitores.find(e=>e.cpf==cpf && e.senha==senha)

if(!ok){
alert("Eleitor inválido")
return
}

if(localStorage.getItem("votou_"+cpf)){
alert("Você já votou")
return
}

localStorage.setItem("eleitorAtual",cpf)

document.getElementById("urnaArea").style.display="block"

}

function digitar(n){

if(numero.length>=2) return

numero+=n

document.getElementById("numero").innerText=numero

if(candidatos[numero]){

document.getElementById("nomeCandidato").innerText=candidatos[numero].nome
document.getElementById("fotoCandidato").src=candidatos[numero].foto

}

}

function corrigir(){

numero=""

document.getElementById("numero").innerText=""
document.getElementById("nomeCandidato").innerText=""
document.getElementById("fotoCandidato").src=""

}

function confirmar(){

if(!candidatos[numero]){
alert("Candidato inválido")
return
}

votos[numero]++

salvarVoto()

}

function votarBranco(){

votos["branco"]++

salvarVoto()

}

function salvarVoto(){

localStorage.setItem("votos",JSON.stringify(votos))

let cpf=localStorage.getItem("eleitorAtual")

localStorage.setItem("votou_"+cpf,true)

alert("Voto confirmado")

corrigir()

}

function gerarPDF(){

const { jsPDF } = window.jspdf

let pdf=new jsPDF()

let y=20

pdf.setFontSize(16)
pdf.text("ASSGA - Associação de Surdos de São Gonçalo do Amarante",20,y)

y+=15

let total=0

for(let c in votos){
total+=votos[c]
}

pdf.text("Total de votos: "+total,20,y)

y+=10

pdf.text("Votos facultativos (branco): "+votos.branco,20,y)

y+=15

for(let c in votos){

if(c!="branco"){

let percentual=((votos[c]/total)*100).toFixed(1)

let linha=c+" - "+candidatos[c].nome+" : "+votos[c]+" votos ("+percentual+"%)"

pdf.text(linha,20,y)

y+=10

}

}

pdf.save("resultado_votacao.pdf")

}

</script>

</body>
</html>
